name: Release
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Configure npm for OIDC trusted publishing (no token needed).
      # Do NOT use setup-node's registry-url — it injects NODE_AUTH_TOKEN
      # which overrides OIDC authentication.
      - run: echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
      - run: npm publish --provenance --access public
